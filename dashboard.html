<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Dashboard</h1>
    <button id="logoutBtn">Logout</button>

    <h2>Courses</h2>
    <form id="courseForm">
      <input type="text" id="courseName" placeholder="Course Name" required>
      <input type="text" id="courseCode" placeholder="Course Code">
      <button type="submit">Add Course</button>
    </form>
    <ul id="courseList"></ul>

    <h2>Study Plans</h2>
    <form id="studyPlanForm">
      <input type="text" id="planTitle" placeholder="Plan Title" required>
      <input type="date" id="planDate" required>
      <button type="submit">Add Study Plan</button>
    </form>
    <ul id="studyPlanList"></ul>

  </div>

  <script src="js/main.js"></script>
</body>
</html>
