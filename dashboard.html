<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Planner - Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard-container">

    <!-- Header -->
    <header class="dashboard-header">
      <h1>Welcome to Your Study Dashboard</h1>
      <button id="logoutBtn">Logout</button>
    </header>

    <!-- Add Course/Plan Form -->
    <section class="add-section">
      <h2>Add New Study Plan</h2>
      <form id="addPlanForm">
        <input type="text" id="courseTitle" placeholder="Course Title" required>
        <input type="text" id="planTitle" placeholder="Plan/Task Title" required>
        <input type="date" id="planDate" required>
        <button type="submit">Add Plan</button>
      </form>
      <div id="addMessage"></div>
    </section>

    <!-- Plans Display -->
    <section class="plans-section">
      <h2>Your Study Plans</h2>
      <div id="plansContainer">
        <!-- Dynamically added cards will appear here -->
      </div>
    </section>

  </div>

 

  <script src="main.js"></script>

  
</body>
</html>
